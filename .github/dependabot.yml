# Automated dependency updates + security alerts.
# https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # The prefix becomes the PR title (linted by pr-title.yml). Use `fix(deps)`
    # so a runtime/security dependency update cuts a patch release + binaries —
    # `build`/`chore` are hidden in release-please and would NOT ship a release.
    commit-message:
      prefix: "fix(deps)"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
    # Bundle every GitHub Actions bump into ONE grouped PR instead of one PR per
    # action, so a routine week of action updates is a single review + merge.
    # Applies to future runs; to regroup the ones already open, comment
    # `@dependabot recreate` on any of them.
    groups:
      github-actions:
        patterns:
          - "*"
