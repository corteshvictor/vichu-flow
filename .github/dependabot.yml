# Automated dependency updates + security alerts.
# https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # The prefix becomes the PR title (linted by pr-title.yml). Use `fix(deps)`
    # so a runtime/security dependency update cuts a patch release + binaries —
    # `build`/`chore` are hidden in release-please and would NOT ship a release.
    commit-message:
      prefix: "fix(deps)"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
