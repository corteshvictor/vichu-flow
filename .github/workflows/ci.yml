name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Tags, so TestEveryReleasedPackIsRecorded can check that every release which shipped
          # a host pack has its fixtures. Without them the test skips, and a forgotten release
          # breaks every upgrade from it — silently, with CI green.
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.5"   # floor: GO-2026-4970 (os.Root symlink escape) is fixed in 1.26.5
          cache: true

      - name: gofmt
        if: runner.os != 'Windows'
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.5"   # floor: GO-2026-4970 (os.Root symlink escape) is fixed in 1.26.5
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.5"   # floor: GO-2026-4970 (os.Root symlink escape) is fixed in 1.26.5
      # Scans the call graph against the Go vulnerability database and fails the
      # build on any reachable vulnerability in our code or dependencies.
      - name: Verify module checksums
        run: go mod verify
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

  examples:
    name: examples (real gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.5"   # floor: GO-2026-4970 (os.Root symlink escape) is fixed in 1.26.5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      # Run each example's real gate so the templates can't rot. Each uses the
      # language's built-in test runner — no package install needed.
      - name: Go example
        run: cd examples/go && go test ./...
      - name: Node example
        run: cd examples/node && node --test
      - name: Python example
        run: cd examples/python && python3 -B -m unittest
      # Install the Rust toolchain explicitly instead of relying on whatever the
      # runner image ships, so the example stays reproducible.
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - name: Rust example
        run: cd examples/rust && cargo test
      # End-to-end smoke: actually run `vichu exec` (the headless entry point)
      # against each example's vichu.yaml (fake agent + the example's REAL gate),
      # not just the gate command in isolation. Proves init-less run → completed →
      # real gate passed.
      - name: vichu exec on each example
        run: |
          set -e
          go build -o /tmp/vichu ./cmd/vichu
          fake='{"result_text":"done","actions":{"implementer":[{"type":"write_file","path":"feature.txt","content":"x\n"}]}}'
          for ex in go node python rust; do
            tmp="$(mktemp -d)"
            # Copy only TRACKED files (git archive), so build artifacts left by an
            # earlier step (target/, node_modules/, __pycache__/) never leak in and
            # make the run non-reproducible.
            git archive "HEAD:examples/$ex" | tar -x -C "$tmp"
            ( cd "$tmp" || exit 1
              git init -q && git config user.email t@e.com && git config user.name T
              git add -A && git commit -qm seed
              printf '%s' "$fake" > .vichu-fake.json
              VICHU_FAKE_SCRIPT="$tmp/.vichu-fake.json" /tmp/vichu exec "add a feature file"
              /tmp/vichu status | grep -qE 'status:[[:space:]]+completed' \
                || { echo "::error::vichu exec on examples/$ex did not complete"; /tmp/vichu status; exit 1; }
              test -f feature.txt || { echo "::error::examples/$ex: agent change not persisted"; exit 1; }
              # A `test: auto` vichu.yaml would still complete with NO gate, so assert
              # a REAL gate verdict (passed) plus that the audit recorded the change.
              # The run-id glob (.vichu/runs/*) matches the single run in this temp repo.
              grep -rlE '"passed":[[:space:]]*true' .vichu/runs/*/gates >/dev/null \
                || { echo "::error::examples/$ex: no passing gate verdict — the real gate did not run"; exit 1; }
              grep -l feature.txt .vichu/runs/*/workers/*/mutations.json >/dev/null \
                || { echo "::error::examples/$ex: feature.txt missing from mutations.json"; exit 1; }
              echo "OK examples/$ex: completed, gate verdict passed, mutation recorded" )
          done

  workflows:
    name: workflow & release config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.5"   # floor: GO-2026-4970 (os.Root symlink escape) is fixed in 1.26.5
      # Lint the GitHub Actions workflows and validate the GoReleaser config so
      # broken YAML / release config is caught in CI, not by manual review.
      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "v2.16.0"
          install-only: true
      - name: goreleaser check
        run: goreleaser check
