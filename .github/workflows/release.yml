name: release

# release-please and GoReleaser run in ONE workflow run. They cannot be split
# across two workflows: a GitHub Release created with the default GITHUB_TOKEN
# does NOT trigger a separate `on: release` workflow (GitHub blocks that to
# prevent loops). So the goreleaser job is chained here via `needs` and only
# runs when release-please actually cut a release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # Dedicated token (not the default GITHUB_TOKEN) so the Release PR it
          # opens DOES trigger CI — otherwise required checks never run and the
          # PR can't be merged under the branch ruleset.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.5"   # floor: GO-2026-4970 (os.Root symlink escape) is fixed in 1.26.5
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # Exact version (not "~> v2") so a release is byte-for-byte reproducible
          # regardless of when it runs. Bump deliberately via PR.
          version: "v2.16.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
