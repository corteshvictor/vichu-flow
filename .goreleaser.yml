# GoReleaser config for VichuFlow. Cross-platform binaries for macOS, Linux, Windows.
# https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: vichu
    main: ./cmd/vichu
    binary: vichu
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: vichu
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# release-please already created the GitHub release and wrote the changelog from
# Conventional Commits; GoReleaser only attaches binaries to it.
release:
  mode: keep-existing

changelog:
  disable: true

