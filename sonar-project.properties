# SonarQube configuration for VichuFlow.
sonar.projectKey=corteshvictor_vichu-flow
sonar.sources=.
sonar.exclusions=web/**,docs/**

# Classify Go test files so test-only rules apply, and so complexity rules
# (which are not meaningful for table-driven test setup) are not enforced there.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage.out

# Cognitive complexity (S3776) is tuned for Java/C# at 15; do not enforce it on
# Go test helpers, which are intentionally long and linear.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
