# VichuFlow config for a Rust project. The gate is `cargo test`.
project:
  name: vichu-example-rust
  language: rust

ui:
  language: en

workflow:
  default: quick

agents:
  default:
    provider: fake   # swap to claude-code to use a real agent

commands:
  test: cargo test
  # `auto` like the Node/Python examples — cargo clippy needs a separate rustup
  # component that isn't guaranteed. Set `lint: cargo clippy` if you install it.
  lint: auto
  typecheck: auto
